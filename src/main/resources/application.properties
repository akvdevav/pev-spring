spring.application.name=pev-spring

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
# Default model (change to whatever you have pulled in Ollama, e.g., llama2, mistral)
spring.ai.ollama.chat.model=gpt-oss:20b
spring.ai.ollama.chat.options.temperature=0.7

# Vaadin Configuration
vaadin.whitelisted-packages=com.vaadin,org.vaadin,com.example.pev

server.port=8088
